name = "openstrap-backend"
compatibility_date = "2024-04-01"

main = "src/index.ts"

[[d1_databases]]
binding = "DB"
database_name = "openstrap-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "RAW_BUCKET"
bucket_name = "openstrap-raw"

# Workers AI — powers the self-hosted, OpenAI-compatible AI Coach (src/coach.ts).
# No external key; runs within Cloudflare's free daily AI allocation.
[ai]
binding = "AI"

# Analytics queue (producer + consumer). Cloudflare Queues require the Workers PAID
# plan ($5/mo). DISABLED here so this deploys on the FREE plan. With no ANALYTICS_Q
# binding, the cron derives each day INLINE instead of enqueuing (see wake_cron.ts /
# queue.ts closeDay) — fine for a personal single-user backend (one close per tick,
# well under the free plan's 1000 Cloudflare-subrequest cap).
#
# To re-enable on Workers Paid: uncomment the four blocks below and
#   npx wrangler queues create openstrap-analytics
#   npx wrangler queues create openstrap-analytics-dlq
#
# [[queues.producers]]
# binding = "ANALYTICS_Q"
# queue = "openstrap-analytics"
#
# [[queues.consumers]]
# queue = "openstrap-analytics"
# max_batch_size = 1
# max_batch_timeout = 10
# max_retries = 3
# dead_letter_queue = "openstrap-analytics-dlq"

# Crons: 30-min sweep (re-derive dirty users → keeps "today" fresh; pure-read
# endpoints serve this snapshot) + nightly full re-derive/prune. Any non-nightly
# cron string falls through to the sweep branch in scheduled(); only "30 3 * * *"
# triggers the nightly path. (Future: tighten the sweep to */15 if needed.)
[triggers]
crons = ["*/30 * * * *", "30 3 * * *"]

[vars]
EMAIL_FROM_NAME = "OpenStrap"
