name = "openstrap-companion"
compatibility_date = "2024-04-01"

main = "src/index.ts"

# ── FREE-TIER BY DESIGN ───────────────────────────────────────────────────────
# This slim companion is built to run entirely on the Cloudflare FREE plan.
#   • NO Queues  — Queues require Workers Paid ($5/mo). The old backend pulled in
#     the paid plan ONLY because of the analytics queue; it's gone now.
#   • NO Cron triggers — the heavy nightly/sweep crons are gone (nothing to derive).
#   • Workers Free: 100k req/day, request body ≤ 100 MB (matches the upload cap).
#   • D1 Free: 5 GB, 5M row-reads + 100k row-writes/day.
#   • R2 Free: 10 GB stored, 1M Class-A + 10M Class-B ops/mo, ZERO egress. Health
#     uploads keep only the latest .db per device (see health.ts) to stay under 10 GB.
#   • Rate limiting binding below is FREE (edge-local, no D1 cost).
# Keep it this way: do NOT add [[queues.*]], [triggers], or Durable Objects.

# Fresh v3 storage (empty) — does NOT touch the old v2 cloud DB/bucket.
[[d1_databases]]
binding = "DB"
database_name = "openstrap-v3-slim-db"
database_id = "1ed30de4-9ff0-4486-9ac1-54cb3b181f57"

# Health-data uploads (opt-in full local .db). R2 has its own free tier and works
# on Workers Free. Create the bucket: `wrangler r2 bucket create openstrap-v3-health`.
[[r2_buckets]]
binding = "HEALTH_BUCKET"
bucket_name = "openstrap-v3-health"

# Native edge rate limiter — FREE (no D1, no extra cost). Protects the
# unauthenticated, device-id-keyed ingest endpoints (/telemetry, /health/upload).
# Optional in code: if this binding is absent the handlers simply skip the check.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 60, period = 60 }

[vars]
EMAIL_FROM_NAME = "OpenStrap"
